<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>FHIRfox</title>
	</head>
	<body>
		<script>
			(function () {
				var redirectStorageKey = 'fhirfox.redirect-path';
				var pathname = window.location.pathname;
				var redirectTarget = pathname + window.location.search + window.location.hash;
				var scenarioMarker = '/scenarios/';
				var basePath = '/';
				var scenarioIndex = pathname.lastIndexOf(scenarioMarker);

				if (scenarioIndex >= 0) {
					basePath = pathname.slice(0, scenarioIndex + 1) || '/';
				} else if (/\/404\.html$/u.test(pathname)) {
					basePath = pathname.replace(/\/404\.html$/u, '/') || '/';
				}

				window.sessionStorage.setItem(redirectStorageKey, redirectTarget);
				window.location.replace(new URL(basePath, window.location.origin).toString());
			})();
		</script>
	</body>
</html>
