id: IPS_TWCORE-OPD-011
name: 病患二：多次複合門診
summary: 病患二完成 7 次跨科門診，涵蓋家醫科、新陳代謝科與心臟內科，每次 3 筆用藥與 5 次檢驗資料。
details: |
  此情境用於驗證同一病人在多科別門診間的 Encounter、用藥、檢驗與報告串接。

  - 家醫科 2 次、新陳代謝科 3 次、心臟內科 2 次
  - 每次門診 3 筆 MedicationRequest
  - 新陳代謝科 3 次檢驗、心臟內科 2 次檢驗
level: 3
scenarioType: outpatient
resources:
  - alias: patient.current
    resourceType: patient
    inputs:
      birthDate:
        gt: 18
    as:
      - subject
  - alias: encounter.hypertension-followup-visit-initial
    resourceType: encounter
    references:
      conditionId: condition.hypertension-followup
      practitionerId: practitioner.family-medicine-clinician
    inputs:
      encounterProfile: family-medicine-outpatient
  - alias: encounter.hypertension-followup-visit-followup
    resourceType: encounter
    references:
      conditionId: condition.hypertension-followup
      practitionerId: practitioner.family-medicine-clinician
    inputs:
      encounterProfile: family-medicine-outpatient
  - alias: encounter.type-2-diabetes-followup-visit-initial
    resourceType: encounter
    references:
      conditionId: condition.type-2-diabetes-followup
      practitionerId: practitioner.endocrinology-clinician
    inputs:
      encounterProfile: endocrinology-outpatient
  - alias: encounter.type-2-diabetes-followup-visit-followup
    resourceType: encounter
    references:
      conditionId: condition.type-2-diabetes-followup
