      encounterProfile: endocrinology-outpatient
  - alias: encounter.type-2-diabetes-followup-visit-subsequent
    resourceType: encounter
    references:
      conditionId: condition.type-2-diabetes-followup
      practitionerId: practitioner.endocrinology-clinician
