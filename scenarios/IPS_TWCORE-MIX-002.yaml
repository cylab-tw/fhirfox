    encounterId: "22"
    observationCode: Lab-0008
  - patientId: "6"
    encounterId: "25"
    observationCode: Lab-0005

procedure:
  patientId: "6"
  encounterId: "27"
  procedureCode: Proc-0006

medicationRequest:
  patientId: "6"
  status: active

diagnosticReport:
  - patientId: "6"
    encounterId: "22"
    reportCode: Rep-0004
  - patientId: "6"
    encounterId: "25"
    reportCode: Rep-0005
