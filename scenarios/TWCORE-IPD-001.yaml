id: TWCORE-IPD-001
name: 住院
summary: 短期住院情境，涵蓋 3 至 5 天住院期間的核心資料，包含入院與出院資訊。
details: |
  此情境用於驗證住院流程中的基本資料結構，適合作為住院資料轉換的基礎案例。

  - 住院天數限制在 3 至 5 天
  - `Encounter.period` 反映住院期間
  - 包含 `admission` 與 `discharge` 相關資訊
  - 可一起觀察住院期間的 `Condition` 與 `Procedure`
level: 1
scenarioType: inpatient
resources:
  - alias: patient.current
    resourceType: patient
    inputs:
      birthday:
        gt: 18
    as:
      - subject
  - alias: encounter.pneumonia-dyspnea-stay
    resourceType: encounter
    references:
      conditionId: condition.pneumonia-dyspnea
      practitionerId: practitioner.inpatient-care-clinician
    inputs:
      encounterProfile: inpatient-stay-from-ed-home
  - alias: organization.hospital
    resourceType: organization
    as:
      - provider
  - alias: practitionerrole.inpatient-care-specialist
    resourceType: practitionerrole
    references:
      practitionerId: practitioner.inpatient-care-clinician
    with:
      - practitionerrole.inpatient-care-specialist
  - alias: practitioner.inpatient-care-clinician
    resourceType: practitioner
  - alias: condition.pneumonia-dyspnea
    resourceType: condition
    references:
      encounterId: encounter.pneumonia-dyspnea-stay
      recorderId: practitionerrole.inpatient-care-specialist
    with:
      - condition.pneumonia-dyspnea
  - alias: procedure.inpatient-chest-xray
    resourceType: procedure
    references:
      encounterId: encounter.pneumonia-dyspnea-stay
      performerId: practitionerrole.inpatient-care-specialist
    with:
      - procedure.inpatient-chest-xray-pneumonia
