id: TWCORE-OPD-006
name: 同病人多次門診（血壓追蹤）
summary: 同一成人病人的多次門診紀錄，加入跨次血壓與一次血糖檢驗，用於驗證病人中心的 Observation。
details: |
  此情境以同一病人的三次門診為範圍，驗證系統是否能表達縱向血壓紀錄與慢性病追蹤脈絡。

  - 同一病人多次門診
  - 每次門診皆可串接對應 `Encounter`
  - 包含多筆血壓與一筆血糖數值
  - 適合檢查趨勢資料與跨 Encounter 的病人中心資料集
level: 2
scenarioType: outpatient
resources:
  - alias: patient.current
    resourceType: patient
    inputs:
      birthday:
        gt: 18
    as:
      - subject
  - alias: encounter.family-medicine-visit-initial
    resourceType: encounter
    references:
      practitionerId: practitioner.family-medicine-clinician
    inputs:
      encounterProfile: family-medicine-outpatient
  - alias: encounter.family-medicine-visit-followup
    resourceType: encounter
    references:
      practitionerId: practitioner.family-medicine-clinician
    inputs:
      encounterProfile: family-medicine-outpatient
  - alias: encounter.family-medicine-visit-subsequent
    resourceType: encounter
    references:
      practitionerId: practitioner.family-medicine-clinician
    inputs:
      encounterProfile: family-medicine-outpatient
  - alias: organization.hospital
    resourceType: organization
    as:
      - provider
  - alias: practitionerrole.family-medicine-attending
    resourceType: practitionerrole
    references:
      practitionerId: practitioner.family-medicine-clinician
    with:
      - practitionerrole.family-medicine-attending
  - alias: practitioner.family-medicine-clinician
    resourceType: practitioner
  - alias: observation.vital-blood-pressure-initial
    resourceType: observation
    references:
      encounterId: encounter.family-medicine-visit-initial
      performerId: practitionerrole.family-medicine-attending
    with:
      - observation.vital.blood-pressure
  - alias: observation.lab-blood-glucose
    resourceType: observation
    references:
      encounterId: encounter.family-medicine-visit-initial
      performerId: practitionerrole.family-medicine-attending
    with:
      - observation.lab.blood-glucose
  - alias: observation.vital-blood-pressure-followup
    resourceType: observation
    references:
      encounterId: encounter.family-medicine-visit-followup
      performerId: practitionerrole.family-medicine-attending
    with:
      - observation.vital.blood-pressure
  - alias: observation.vital-blood-pressure-subsequent
    resourceType: observation
    references:
      encounterId: encounter.family-medicine-visit-subsequent
      performerId: practitionerrole.family-medicine-attending
    with:
      - observation.vital.blood-pressure
