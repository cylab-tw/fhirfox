  - alias: medicationrequest.clopidogrel-75-mg-order-initial
    resourceType: medicationrequest
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-followup
      medicationId: medication.clopidogrel-75-mg-tablet
      reasonReferenceId: condition.coronary-artery-disease-stent
      requesterId: practitionerrole.cardiology-specialist
    with:
      - medicationrequest.clopidogrel-75-mg
  - alias: medicationrequest.metoprolol-25-mg-order-subsequent
    resourceType: medicationrequest
    references:
