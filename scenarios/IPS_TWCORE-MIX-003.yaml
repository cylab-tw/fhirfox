id: IPS_TWCORE-MIX-003
name: 病患五：多次門診與住院手術
summary: 病患五完成 4 次心臟內科門診、冠狀動脈支架置放住院手術、每次門診 3 筆用藥與 3 次檢驗。
details: |
  此情境用於驗證同一病人的心臟內科門診、住院 Encounter 與支架手術 Procedure 可一起轉出。

  - 心臟內科門診 4 次
  - 冠狀動脈支架置放手術 1 次
  - 支架置放相關住院 1 次
  - 每次門診 3 筆 MedicationRequest
  - 心臟內科檢驗 3 次
level: 3
scenarioType: mixed
resources:
  - alias: patient.current
    resourceType: patient
    inputs:
      birthday:
        gt: 18
    as:
      - subject
  - alias: encounter.coronary-artery-disease-stent-visit-initial
    resourceType: encounter
    references:
      conditionId: condition.coronary-artery-disease-stent
      practitionerId: practitioner.cardiology-clinician
    inputs:
      encounterProfile: cardiology-outpatient
  - alias: encounter.coronary-artery-disease-stent-visit-followup
    resourceType: encounter
    references:
      conditionId: condition.coronary-artery-disease-stent
      practitionerId: practitioner.cardiology-clinician
    inputs:
      encounterProfile: cardiology-outpatient
  - alias: encounter.coronary-artery-disease-stent-visit-subsequent
    resourceType: encounter
    references:
      conditionId: condition.coronary-artery-disease-stent
      practitionerId: practitioner.cardiology-clinician
    inputs:
      encounterProfile: cardiology-outpatient
  - alias: encounter.coronary-artery-disease-stent-visit-maintenance
    resourceType: encounter
    references:
      conditionId: condition.coronary-artery-disease-stent
      practitionerId: practitioner.cardiology-clinician
    inputs:
      encounterProfile: cardiology-outpatient
  - alias: encounter.coronary-artery-disease-stent-stay
    resourceType: encounter
    references:
      conditionId: condition.coronary-artery-disease-stent
      practitionerId: practitioner.cardiology-clinician
    inputs:
      encounterProfile: cardiology-inpatient-discharge-home
  - alias: organization.hospital
    resourceType: organization
    as:
      - provider
  - alias: practitionerrole.cardiology-specialist
    resourceType: practitionerrole
    references:
      practitionerId: practitioner.cardiology-clinician
    with:
      - practitionerrole.cardiology-specialist
  - alias: practitioner.cardiology-clinician
    resourceType: practitioner
  - alias: observation.lab-troponin
    resourceType: observation
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-initial
      performerId: organization.hospital
    with:
      - observation.lab.troponin
  - alias: observation.lab-followup-glucose
    resourceType: observation
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-subsequent
      performerId: organization.hospital
    with:
      - observation.lab.followup-glucose
  - alias: observation.lab-pathology-marker
    resourceType: observation
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-maintenance
      performerId: organization.hospital
    with:
      - observation.lab.pathology-marker
  - alias: procedure.coronary-stent-placement
    resourceType: procedure
    references:
      encounterId: encounter.coronary-artery-disease-stent-stay
      performerId: practitionerrole.cardiology-specialist
    with:
      - procedure.coronary-stent-placement-cardiology
  - alias: diagnosticreport.cardiac-enzyme-report
    resourceType: diagnosticreport
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-initial
      performerId: organization.hospital
      resultId: observation.lab-troponin
    inputs:
      reportCode: Rep-0005
  - alias: diagnosticreport.lipid-report
    resourceType: diagnosticreport
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-subsequent
      performerId: organization.hospital
      resultId: observation.lab-followup-glucose
    inputs:
      reportCode: Rep-0002
  - alias: diagnosticreport.cbc-report
    resourceType: diagnosticreport
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-maintenance
      performerId: organization.hospital
      resultId: observation.lab-pathology-marker
    inputs:
      reportCode: Rep-0001
  - alias: medicationrequest.metoprolol-25-mg-order-initial
    resourceType: medicationrequest
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-initial
      medicationId: medication.metoprolol-25-mg-tablet
      reasonReferenceId: condition.coronary-artery-disease-stent
      requesterId: practitionerrole.cardiology-specialist
    with:
      - medicationrequest.metoprolol-25-mg
  - alias: medicationrequest.aspirin-100-mg-order-initial
    resourceType: medicationrequest
    references:
      encounterId: encounter.coronary-artery-disease-stent-visit-initial
      medicationId: medication.aspirin-100-mg-tablet
      reasonReferenceId: condition.coronary-artery-disease-stent
      requesterId: practitionerrole.cardiology-specialist
    with:
