id: TWCORE-ER-003
name: 急診（胸痛用藥與影像報告）
summary: 急診胸痛案例，整合 ECG、Troponin、CXR 報告、ImagingStudy 與即時用藥。
details: |
  此情境用於驗證急診即時檢驗、影像報告與緊急用藥是否能在同一次急診 Encounter 中完整關聯。

  - 急診胸痛
  - 包含 Troponin 與 ECG
  - 加入胸部 X 光 `ImagingStudy` 與 `DiagnosticReport`
  - 開立急診即時用藥
level: 3
scenarioType: emergency
resources:
  - alias: patient.current
    resourceType: patient
    inputs:
      birthDate:
        gt: 18
    as:
      - subject
  - alias: encounter.emergency-visit
    resourceType: encounter
    references:
      conditionId: condition.acute-chest-pain
      practitionerId: practitioner.emergency-medicine-clinician
    inputs:
      encounterProfile: emergency-visit-from-ed
  - alias: organization.hospital
    resourceType: organization
    as:
      - provider
  - alias: practitionerrole.emergency-medicine-emergency-clinician
    resourceType: practitionerrole
    references:
      practitionerId: practitioner.emergency-medicine-clinician
    with:
      - practitionerrole.emergency-medicine-clinician
  - alias: practitioner.emergency-medicine-clinician
    resourceType: practitioner
  - alias: condition.acute-chest-pain
    resourceType: condition
    references:
      recorderId: practitionerrole.emergency-medicine-emergency-clinician
    with:
      - condition.acute-chest-pain
  - alias: observation.lab-troponin
    resourceType: observation
    references:
      encounterId: encounter.emergency-visit
      performerId: practitionerrole.emergency-medicine-emergency-clinician
    with:
      - observation.lab.troponin
  - alias: procedure.emergency-ecg
    resourceType: procedure
    references:
      encounterId: encounter.emergency-visit
      performerId: practitionerrole.emergency-medicine-emergency-clinician
    with:
      - procedure.emergency-ecg-chest-pain
  - alias: diagnosticreport.chest-imaging-report
    resourceType: diagnosticreport
    references:
      encounterId: encounter.emergency-visit
      imagingStudyId: imagingstudy.emergency-chest-xray
      resultId: observation.lab-troponin
      performerId: organization.hospital
    inputs:
      reportCode: Rep-0007
  - alias: imagingstudy.emergency-chest-xray
    resourceType: imagingstudy
    with:
      - imagingstudy.emergency-chest-xray
    references:
      encounterId: encounter.emergency-visit
  - alias: medicationrequest.aspirin-100-mg-chewable-tablet-order
    resourceType: medicationrequest
    references:
      encounterId: encounter.emergency-visit
      medicationId: medication.aspirin-100-mg
      requesterId: practitionerrole.emergency-medicine-emergency-clinician
    with:
      - medicationrequest.aspirin-100-mg-chewable-tablet
  - alias: medication.aspirin-100-mg
    resourceType: medication
    inputs:
      code: Med-0005
