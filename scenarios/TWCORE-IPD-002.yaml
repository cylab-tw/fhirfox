# yaml-language-server: $schema=./schema.yaml

id: TWCORE-IPD-002
name: 住院（連續檢驗與實驗室檢查）
level: 2
type: inpatient
summary: 住院肺炎案例，加入每日生命徵象、CBC 與血糖，驗證住院期間連續性 Observation。
details: |
  此情境延續住院案例，加入住院期間連續量測與實驗室檢查，支援檢查住院資料的時間軸與臨床合理性。

  - 3 至 5 天住院期間
  - 包含每日體溫、呼吸速率與血氧
  - 加入 CBC 與血糖等實驗室檢驗
  - 適合檢查連續檢驗與 `Encounter.period` 的一致性

selection:
  strategy: best-match
  maxSeeds: 3
  maxPatients: 1
  maxLinkedEncounters: 1
  expandLinks: true

observation:
  - observationCode: VS-0005
    encounterId: "7"
  - observationCode: LAB-0001
    encounterId: "7"
  - observationCode: LAB-0002
    encounterId: "7"
