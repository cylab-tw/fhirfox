resourceType: practitionerrole
name: PractitionerRole
summary: 描述健康照護服務提供者在特定機構中的角色、專科、服務期間與聯絡方式。

bindings:
  - practitionerrole-role-code
  - practitionerrole-specialty-code
  - contact-point-system
  - contact-point-use

references:
  practitioner:
    definition: 擔任此角色的健康照護服務提供者。
    resourceTypes:
      - practitioner
  organization:
    key: provider
    definition: 此角色所屬或代表的機構。
    resourceTypes:
      - organization

fields:
  - id: id
    definition: 來源資料內部角色識別碼，用於資源關聯。
    type: string
    required: true
    path: practitionerrole.id
  - id: identifierValue
    definition: 健康照護服務提供者角色對外識別碼。
    type: identifier
    required: false
    path: practitionerrole.identifierValue
    default: $random("KP00018", "KP00021", "KP00034", "KP00047", "KP00052")
  - id: idSystem
    definition: 健康照護服務提供者角色識別碼所屬系統。
    type: string
    required: false
    path: practitionerrole.idSystem
    default: https://www.tph.mohw.gov.tw
  - id: active
    definition: 此角色紀錄是否使用中。
    type: boolean
    required: false
    path: practitionerrole.active
    default: true
  - id: practitionerId
    definition: 擔任此角色的健康照護服務提供者 ID。
    type: reference
    reference: practitioner
    required: false
    path: practitionerrole.practitionerId
  - id: organizationId
    definition: 此角色所屬或代表的機構 ID。
    type: reference
    reference: organization
    required: false
    path: practitionerrole.organizationId
  - id: roleCode
    definition: 此人員在機構中的角色。
    type: code
    binding: practitionerrole-role-code
    required: false
    path: practitionerrole.roleCode
  - id: roleText
    definition: 此人員在機構中的角色文字。
    type: string
    required: false
    path: practitionerrole.roleText
  - id: specialtyCode
    definition: 此角色提供服務的專科或科別。
    type: code
    binding: practitionerrole-specialty-code
    required: false
    path: practitionerrole.specialtyCode
  - id: periodStart
    definition: 此角色可提供服務的起始時間。
    type: dateTime
    required: false
    path: practitionerrole.periodStart
    default: 2024-01-01T08:00:00+08:00
  - id: periodEnd
    definition: 此角色可提供服務的結束時間。
    type: dateTime
    required: false
    path: practitionerrole.periodEnd
    default: 2026-12-31T17:00:00+08:00
  - id: telecomSystem
    definition: 聯絡方式類型。
    type: code
    binding: contact-point-system
    required: false
    path: practitionerrole.telecomSystem
    default: phone
  - id: telecomUse
    definition: 聯絡方式用途。
    type: code
    binding: contact-point-use
    required: false
    path: practitionerrole.telecomUse
    default: work
  - id: telecomValue
    definition: 聯絡方式號碼/信箱。
    type: string
    required: false
    path: practitionerrole.telecomValue
    default: "02-2312-3456"
