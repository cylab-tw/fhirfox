resourceType: patient
name: Patient
summary: 描述情境中的主要病人，包含身分識別、姓名、性別、生日、聯絡方式與管理機構。

defaults:
  with:
    - patient.tw-core-defaults

bindings:
  - administrative-gender
  - patient-contact-relationship
  - contact-point-system
  - contact-point-use

references:
  organization:
    key: provider
    definition: 此情境主要照護或資料提供機構。
    resourceTypes:
      - organization

fields:
  - id: id
    definition: 病歷號。
    type: identifier
    required: true
    path: patient.id
  - id: idSystem
    definition: 病歷號所屬系統。
    type: string
    required: false
    path: patient.idSystem
    default: https://www.tph.mohw.gov.tw
  - id: idNumber
    definition: 身分證字號。
    type: string
    required: true
    path: patient.idNumber
    default: $taiwanNationalId()
  - id: active
    definition: 此基本資料是否使用中。
    type: boolean
    required: false
    path: patient.active
    default: true
  - id: name
    definition: 姓名。
    type: string
    required: true
    path: patient.name
    default: $humanName()
  - id: telecomSystem
    definition: 聯絡方式類型。
    type: code
    binding: contact-point-system
    required: false
    path: patient.telecomSystem
    default: phone
  - id: telecomUse
    definition: 聯絡方式用途。
    type: code
    binding: contact-point-use
    required: false
    path: patient.telecomUse
    default: mobile
  - id: telecomValue
    definition: 聯絡方式號碼/信箱。
    type: string
    required: false
    path: patient.telecomValue
    default: $taiwanMobilePhone()
  - id: gender
    definition: 性別。
    type: code
    binding: administrative-gender
    required: true
    path: patient.gender
    default: $random()
  - id: birthDate
    definition: 出生日期。
    type: date
    required: true
    path: patient.birthDate
    default: $birthDate(0, 120)
  - id: address
    definition: 地址。
    type: string
    required: false
    path: patient.address
    default: $taiwanAddress()
  - id: organization
    definition: 此紀錄的保管機構。
    type: reference
    reference: organization
    required: false
    path: patient.organization
  - id: contactRelationship
    definition: 聯絡人的關係。
    type: code
    binding: patient-contact-relationship
    required: false
    path: patient.contactRelationship
  - id: contactName
    definition: 聯絡人姓名。
    type: string
    required: false
    path: patient.contactName
  - id: contactTelecomSystem
    definition: 聯絡人聯絡方式類型。
    type: code
    binding: contact-point-system
    required: false
    path: patient.contactTelecomSystem
  - id: contactTelecomUse
    definition: 聯絡人聯絡方式用途。
    type: code
    binding: contact-point-use
    required: false
    path: patient.contactTelecomUse
  - id: contactTelecomValue
    definition: 聯絡人聯絡方式號碼/信箱。
    type: string
    required: false
    path: patient.contactTelecomValue
