resourceType: patient
name: Patient
summary: 描述情境中的主要病人，包含身分識別、姓名、性別、生日、聯絡方式與管理機構。
bindings:
  organization:
    key: provider
    name: Scenario organization
    resourceTypes:
      - organization
    summary: 此情境主要照護或資料提供機構。
fields:
  - id: id
    name: Id
    summary: 來源 HIS 病人識別碼。
    type: string
    path: Patient.identifier.value
    cardinality: 0..1
    fhirMapping: Patient.identifier.value
    required: true
  - id: idSystem
    name: Id System
    summary: 來源 HIS 病人識別碼系統。
    type: string
    path: Patient.identifier.system
    cardinality: 0..1
    fhirMapping: Patient.identifier.system
    required: false
    default: https://fhirfox.dev/identifier-system/patient
  - id: identityNumber
    name: Identity Number
    summary: 證件號碼
    type: string
    path: Patient.identifier.value
    cardinality: 0..1
    fhirMapping: Patient.identifier.value
    required: false
    default: $taiwanNationalId()
  - id: identityType
    name: Identity Type
    summary: 證件類型
    type: code
    path: Patient.identifier.type.coding.code
    cardinality: 0..1
    fhirMapping: Patient.identifier.type.coding.code
    required: false
    default: NNxxx
  - id: name
    name: Name
    summary: 姓名
    type: string
    path: Patient.name.text
    cardinality: 0..1
    fhirMapping: Patient.name.text
    required: false
    default: $humanName()
  - id: gender
    name: Gender
    summary: 病人性別
    type: code
    path: Patient.gender
    cardinality: 0..1
    fhirMapping: Patient.gender
    required: false
    default: $pick()
    input:
      oneOf:
        - male
        - female
  - id: birthday
    name: Birthday
    summary: 出生日期
    type: date
    path: Patient.birthDate
    cardinality: 0..1
    fhirMapping: Patient.birthDate
    required: false
    default: $birthDate()
    input:
      gte: 0
      lte: 120
  - id: telecomSystem
    name: Telecom System
    summary: 聯絡方式類型
    type: code
    path: Patient.telecom.system
    cardinality: 0..1
    fhirMapping: Patient.telecom.system
    required: false
    default: phone
  - id: telecomUse
    name: Telecom Use
    summary: 聯絡方式用途
    type: code
    path: Patient.telecom.use
    cardinality: 0..1
    fhirMapping: Patient.telecom.use
    required: false
    default: mobile
  - id: telecomValue
    name: Telecom Value
    summary: 聯絡號碼/信箱
    type: string
    path: Patient.telecom.value
    cardinality: 0..1
    fhirMapping: Patient.telecom.value
    required: false
    default: $taiwanMobilePhone()
  - id: address
    name: Address
    summary: 通訊地址
    type: string
    path: Patient.address.text
    cardinality: 0..1
    fhirMapping: Patient.address.text
    required: false
    default: $taiwanAddress()
  - id: organization
    name: Organization
    summary: 管理機構
    type: reference
    path: Patient.managingOrganization.reference
    cardinality: 0..1
    fhirMapping: Patient.managingOrganization.reference
    required: false
    reference:
      binding: organization
  - id: active
    name: Active
    summary: 紀錄狀態。
    type: string
    path: Patient.active
    cardinality: 0..1
    fhirMapping: Patient.active
    required: false
