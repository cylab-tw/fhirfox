resourceType: observation
name: Observation
summary: 此情境納入的 Observation 原始資料。
bindings:
  encounter:
    key: encounter
    name: Scenario encounter
    resourceTypes:
      - encounter
    summary: 此情境相關就醫事件。
  patient:
    key: subject
    name: Scenario patient
    resourceTypes:
      - patient
    summary: 此情境主要病人。
  performer:
    key: observation.performer
    name: Scenario performer
    resourceTypes:
      - organization
      - patient
      - practitioner
      - practitionerrole
    summary: 此情境量測或執行者。
fields:
  - id: id
    name: Id
    summary: 來源 HIS 觀察識別碼
    type: string
    path: Observation.identifier.value
    cardinality: 0..1
    fhirMapping: Observation.identifier.value
    required: true
  - id: idSystem
    name: Id System
    summary: 來源 HIS 觀察識別碼系統
    type: string
    path: Observation.identifier.system
    cardinality: 0..1
    fhirMapping: Observation.identifier.system
    required: false
    default: https://fhirfox.dev/identifier-system/observation
  - id: status
    name: Status
    summary: 狀態
    type: code
    path: Observation.status
    cardinality: 0..1
    fhirMapping: Observation.status
    required: false
    default: final
  - id: categoryCode
    name: Category Code
    summary: 分類代碼
    type: code
    path: Observation.category
    cardinality: 0..1
    fhirMapping: Observation.category
    required: false
  - id: observationCode
    name: Observation Code
    summary: 量測項目
    type: code
    path: Observation.code.coding.code
    cardinality: 0..1
    fhirMapping: Observation.code.coding.code
    required: false
  - id: patientId
    name: Patient Id
    summary: 病人
    type: reference
    path: Observation.subject.reference
    cardinality: 0..1
    fhirMapping: Observation.subject.reference
    required: false
    reference:
      binding: patient
  - id: encounterId
    name: Encounter Id
    summary: 就醫紀錄
    type: reference
    path: Observation.encounter.reference
    cardinality: 0..1
    fhirMapping: Observation.encounter.reference
    required: false
    reference:
      binding: encounter
  - id: effectiveDate
    name: Effective Date
    summary: 量測時間
    type: datetime
    path: Observation.effectiveDateTime
    cardinality: 0..1
    fhirMapping: Observation.effectiveDateTime
    required: false
    default: $dateTime()
    input:
      between:
        - 2026-03-01T08:00:00+08:00
        - 2026-07-31T18:00:00+08:00
  - id: performerId
    name: Performer Id
    summary: 量測人員
    type: reference
    path: Observation.performer.reference
    cardinality: 0..1
    fhirMapping: Observation.performer.reference
    required: false
    reference:
      binding: performer
  - id: valueQuantity
    name: Value Quantity
    summary: 測量數值
    type: number
    path: Observation.valueQuantity.value
    cardinality: 0..1
    fhirMapping: Observation.valueQuantity.value
    required: false
  - id: valueUnit
    name: Value Unit
    summary: 測量單位
    type: code
    path: Observation.valueQuantity.unit
    cardinality: 0..1
    fhirMapping: Observation.valueQuantity.unit
    required: false
  - id: dataAbsentReason
    name: Data Absent Reason
    summary: 缺失原因
    type: string
    path: Observation.dataAbsentReason
    cardinality: 0..1
    fhirMapping: Observation.dataAbsentReason
    required: false
  - id: rangeLow
    name: Range Low
    summary: 參考下限
    type: number
    path: Observation.referenceRange.low
    cardinality: 0..1
    fhirMapping: Observation.referenceRange.low
    required: false
  - id: rangeHigh
    name: Range High
    summary: 參考上限
    type: number
    path: Observation.referenceRange.high
    cardinality: 0..1
    fhirMapping: Observation.referenceRange.high
    required: false
  - id: systolicValue
    name: Systolic Value
    summary: 收縮壓數值
    type: number
    path: Observation.component.valueQuantity.value
    cardinality: 0..1
    fhirMapping: Observation.component.valueQuantity.value
    required: false
  - id: diastolicValue
    name: Diastolic Value
    summary: 舒張壓數值
    type: number
    path: Observation.component.valueQuantity.value
    cardinality: 0..1
    fhirMapping: Observation.component.valueQuantity.value
    required: false
