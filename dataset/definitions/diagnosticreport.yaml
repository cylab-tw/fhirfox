resourceType: diagnosticreport
name: DiagnosticReport
summary: 彙整檢驗、影像或病理報告，包含報告分類、結果參照、執行者與文字結論。
bindings:
  encounter:
    key: encounter
    name: Scenario encounter
    resourceTypes:
      - encounter
    summary: 此情境相關就醫事件。
  imagingstudy:
    key: imagingStudy
    name: Scenario imaging study
    resourceTypes:
      - imagingstudy
    summary: 此情境影像檢查。
  patient:
    key: subject
    name: Scenario patient
    resourceTypes:
      - patient
    summary: 此情境主要病人。
  observation:
    key: result
    name: Scenario observation result
    resourceTypes:
      - observation
    summary: 此情境檢驗/檢查結果。
  performer:
    key: diagnosticreport.performer
    name: Scenario performer
    resourceTypes:
      - organization
      - practitioner
      - practitionerrole
    summary: 此情境報告執行者。
fields:
  - id: id
    name: Id
    summary: 來源 HIS 報告識別碼
    type: string
    path: DiagnosticReport.identifier.value
    cardinality: 0..1
    fhirMapping: DiagnosticReport.identifier.value
    required: true
  - id: idSystem
    name: Id System
    summary: 來源 HIS 報告識別碼系統
    type: string
    path: DiagnosticReport.identifier.system
    cardinality: 0..1
    fhirMapping: DiagnosticReport.identifier.system
    required: false
    default: https://fhirfox.dev/identifier-system/diagnosticreport
  - id: status
    name: Status
    summary: 報告狀態
    type: code
    path: DiagnosticReport.status
    cardinality: 0..1
    fhirMapping: DiagnosticReport.status
    required: false
    default: final
  - id: categoryCode
    name: Category Code
    summary: 服務類別
    type: code
    path: DiagnosticReport.category
    cardinality: 0..1
    fhirMapping: DiagnosticReport.category
    required: false
    default: $case()
    input:
      source: reportCode
      default: LAB
      cases:
        Rep-0007:
          categoryCode: RAD
        Rep-0017:
          categoryCode: SP
  - id: reportCode
    name: Report Code
    summary: 報告項目代碼
    type: code
    path: DiagnosticReport.code.coding.code
    cardinality: 0..1
    fhirMapping: DiagnosticReport.code.coding.code
    required: false
    default: $input()
  - id: patientId
    name: Patient Id
    summary: 病人
    type: reference
    path: DiagnosticReport.subject.reference
    cardinality: 0..1
    fhirMapping: DiagnosticReport.subject.reference
    required: false
    reference:
      binding: patient
  - id: encounterId
    name: Encounter Id
    summary: 就醫紀錄
    type: reference
    path: DiagnosticReport.encounter.reference
    cardinality: 0..1
    fhirMapping: DiagnosticReport.encounter.reference
    required: false
    reference:
      binding: encounter
  - id: imagingStudyId
    name: Imaging Study Id
    summary: 影像檢查參照
    type: reference
    path: DiagnosticReport.imagingStudy.reference
    cardinality: 0..1
    fhirMapping: DiagnosticReport.imagingStudy.reference
    required: false
    reference:
      binding: imagingstudy
  - id: issued
    name: Issued
    summary: 報告產出時間
    type: datetime
    path: DiagnosticReport.issued
    cardinality: 0..1
    fhirMapping: DiagnosticReport.issued
    required: false
    default: $addMinutes($value('effectiveDate'), 90)
  - id: performerId
    name: Performer Id
    summary: 報告負責人員
    type: reference
    path: DiagnosticReport.performer.reference
    cardinality: 0..1
    fhirMapping: DiagnosticReport.performer.reference
    required: false
    reference:
      binding: performer
  - id: resultId
    name: Result Id
    summary: 檢驗數值參照
    type: reference
    path: DiagnosticReport.result.reference
    cardinality: 0..1
    fhirMapping: DiagnosticReport.result.reference
    required: false
    reference:
      binding: observation
  - id: conclusion
    name: Conclusion
    summary: 文字結論(解釋)
    type: string
    path: DiagnosticReport.conclusion
    cardinality: 0..1
    fhirMapping: DiagnosticReport.conclusion
    required: false
    default: $case()
    input:
      source: reportCode
      cases:
        Rep-0001:
          reportCode: Rep-0001
          conclusion: CBC/coagulation report generated for this scenario.
        Rep-0002:
          reportCode: Rep-0002
          conclusion: Lipid report generated for this scenario.
        Rep-0004:
          reportCode: Rep-0004
          conclusion: HbA1c report generated for this scenario.
        Rep-0005:
          reportCode: Rep-0005
          conclusion: Cardiac enzyme or glucose report generated for this scenario.
        Rep-0006:
          reportCode: Rep-0006
          conclusion: Urinalysis report generated for this scenario.
        Rep-0007:
          reportCode: Rep-0007
          conclusion: Chest imaging report generated for this scenario.
        Rep-0017:
          reportCode: Rep-0017
          conclusion: Pathology report generated for this scenario.
