resourceType: diagnosticreport
name: DiagnosticReport
summary: 彙整檢驗、影像或病理報告，包含報告分類、結果參照、執行者與文字結論。

defaults:
  with:
    - diagnosticreport.default-final

bindings:
  - diagnostic-report-status
  - diagnostic-service-sections
  - report-codes

references:
  subject:
    definition: 診斷對象。
    resourceTypes:
      - patient
      - practitioner
      - practitionerrole
  encounter:
    definition: 就醫紀錄。
    resourceTypes:
      - encounter
  performer:
    key: provider
    definition: 負責此診斷報告人員/機構。
    resourceTypes:
      - organization
  result:
    definition: 診斷報告結果。
    resourceTypes:
      - observation
  study:
    definition: 影像檢查。
    resourceTypes:
      - imagingstudy

fields:
  - id: id
    definition: 診斷報告識別碼。
    type: identifier
    required: true
    path: diagnosticreport.id
  - id: status
    definition: 診斷報告的狀態。
    type: code
    binding: diagnostic-report-status
    required: true
    path: diagnosticreport.status
  - id: categoryCode
    definition: 診斷報告的類別。
    type: code
    binding: diagnostic-service-sections
    required: false
    path: diagnosticreport.categoryCode
  - id: categoryText
    definition: 診斷報告的類別文字描述。
    type: string
    required: false
    path: diagnosticreport.categoryText
  - id: reportCode
    definition: 診斷報告。
    type: code
    binding: report-codes
    required: true
    path: diagnosticreport.reportCode
    default: $case()
    input:
      source: reportCode
      default: Rep-0001
      cases:
        Rep-0001: Rep-0001
        Rep-0002: Rep-0002
        Rep-0003: Rep-0003
        Rep-0004: Rep-0004
        Rep-0005: Rep-0005
        Rep-0006: Rep-0006
        Rep-0007: Rep-0007
        Rep-0008: Rep-0008
        Rep-0009: Rep-0009
        Rep-0010: Rep-0010
        Rep-0011: Rep-0011
        Rep-0012: Rep-0012
        Rep-0013: Rep-0013
        Rep-0014: Rep-0014
        Rep-0015: Rep-0015
        Rep-0016: Rep-0016
        Rep-0017: Rep-0017
        Rep-0018: Rep-0018
  - id: reportText
    definition: 診斷報告項目文字描述。
    type: string
    required: false
    path: diagnosticreport.reportText
  - id: subjectId
    definition: 診斷對象 ID。
    type: reference
    reference: subject
    required: false
    path: diagnosticreport.subjectId
  - id: encounterId
    definition: 就醫紀錄 ID。
    type: reference
    reference: encounter
    required: false
    path: diagnosticreport.encounterId
  - id: effectiveDateTime
    definition: 臨床相關報告時間。
    type: dateTime
    required: false
    path: diagnosticreport.effectiveDateTime
    default: $dateTime("2026-03-01T08:00:00+08:00", "2026-07-31T18:00:00+08:00")
  - id: issued
    definition: 診斷報告時間。
    type: dateTime
    required: false
    path: diagnosticreport.issued
    default: $addMinutes($value('effectiveDateTime'), 90)
  - id: performerId
    definition: 負責此診斷報告人員/機構 ID。
    type: reference
    reference: performer
    required: false
    path: diagnosticreport.performerId
  - id: resultId
    definition: 診斷報告結果 ID。
    type: reference
    reference: result
    required: false
    path: diagnosticreport.resultId
  - id: imagingStudyId
    definition: 影像檢查 ID。
    type: reference
    reference: study
    required: false
    path: diagnosticreport.imagingStudyId
  - id: conclusion
    definition: 診斷報告結論。
    type: string
    required: false
    path: diagnosticreport.conclusion
