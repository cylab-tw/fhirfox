resourceType: medicationrequest
name: MedicationRequest
summary: 記錄藥品請求或處方，包含狀態、意圖、藥品、病人、就醫事件、開立者、開立原因、用法與供藥期間。

bindings:
  - medicationrequest-status
  - medicationrequest-intent
  - medicationrequest-route-code
  - medicationrequest-timing-code
  - unitsofmeasure

references:
  medication:
    definition: 此藥品請求所指定的藥品。
    resourceTypes:
      - medication
  subject:
    definition: 開立此藥品請求的對象。
    resourceTypes:
      - patient
  encounter:
    definition: 與此藥品請求密切相關的就醫事件。
    resourceTypes:
      - encounter
  requester:
    definition: 提出此藥品請求的人或機構。
    resourceTypes:
      - practitioner
      - practitionerrole
      - organization
      - patient
  reasonReference:
    definition: 開立此藥品請求的原因。
    resourceTypes:
      - condition
      - observation-laboratory-result
      - observation-vital-signs

fields:
  - id: id
    definition: 藥品請求的外部識別碼。
    type: identifier
    required: true
    path: medicationrequest.id
  - id: idSystem
    definition: 藥品請求外部識別碼所屬系統。
    type: string
    required: false
    path: medicationrequest.idSystem
    default: https://www.tph.mohw.gov.tw/fhir/medicationrequest
  - id: status
    definition: 藥品請求的狀態。
    type: code
    binding: medicationrequest-status
    required: true
    path: medicationrequest.status
    default: active
  - id: intent
    definition: 藥品請求的意圖。
    type: code
    binding: medicationrequest-intent
    required: true
    path: medicationrequest.intent
    default: order
  - id: medicationId
    definition: 藥品定義 ID。
    type: reference
    reference: medication
    required: true
    path: medicationrequest.medicationId
  - id: patientId
    definition: 開立此藥品請求的病人 ID。
    type: reference
    reference: subject
    required: true
    path: medicationrequest.patientId
  - id: encounterId
    definition: 與此藥品請求密切相關的就醫事件 ID。
    type: reference
    reference: encounter
    required: false
    path: medicationrequest.encounterId
  - id: authoredOn
    definition: 藥品請求最初請求時間。
    type: dateTime
    required: false
    path: medicationrequest.authoredOn
    default: $dateTime("2026-03-01T08:00:00+08:00", "2026-07-31T18:00:00+08:00")
  - id: requesterId
    definition: 提出此藥品請求的人或機構 ID。
    type: reference
    reference: requester
    required: false
    path: medicationrequest.requesterId
  - id: reasonReferenceId
    definition: 開立處方原因的參照 ID。
    type: reference
    reference: reasonReference
    required: false
    path: medicationrequest.reasonReferenceId
  - id: dosageText
    definition: 應該如何用藥的文字說明。
    type: string
    required: false
    path: medicationrequest.dosageText
  - id: frequency
    definition: 指定期間內的用藥次數。
    type: number
    required: false
    path: medicationrequest.frequency
  - id: period
    definition: 用藥頻率週期。
    type: number
    required: false
    path: medicationrequest.period
    default: 1
  - id: periodUnit
    definition: 用藥頻率週期單位。
    type: string
    required: false
    path: medicationrequest.periodUnit
    default: d
  - id: timingCode
    definition: 用藥頻率代碼。
    type: code
    binding: medicationrequest-timing-code
    required: false
    path: medicationrequest.timingCode
  - id: routeCode
    definition: 給藥途徑代碼。
    type: code
    binding: medicationrequest-route-code
    required: false
    path: medicationrequest.routeCode
  - id: doseValue
    definition: 每次給藥的劑量數值。
    type: number
    required: false
    path: medicationrequest.doseValue
  - id: doseCode
    definition: 每次給藥劑量的 UCUM 代碼。
    type: code
    binding: unitsofmeasure
    required: false
    path: medicationrequest.doseCode
  - id: durationValue
    definition: 每次配藥可持續的期間數值。
    type: number
    required: false
    path: medicationrequest.durationValue
  - id: durationCode
    definition: 每次配藥可持續期間的 UCUM 代碼。
    type: code
    binding: unitsofmeasure
    required: false
    path: medicationrequest.durationCode
    default: d
