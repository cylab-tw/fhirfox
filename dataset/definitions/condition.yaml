resourceType: condition
name: Condition
summary: 描述病人的病情、問題或診斷，並連結到紀錄時間。

bindings:
  - condition-clinical
  - condition-ver-status
  - condition-category
  - condition-severity
  - condition-code

references:
  subject:
    definition: 有此病情、問題或診斷的病人。
    resourceTypes:
      - patient
  asserter:
    key: subject
    definition: 聲稱有此病情、問題或診斷的人。
    resourceTypes:
      - patient
      - practitioner
      - practitionerrole
fields:
  - id: id
    definition: 診斷識別碼。
    type: identifier
    required: true
    path: condition.id
  - id: clinicalStatus
    definition: 病情、問題或診斷的臨床狀態。
    type: code
    binding: condition-clinical
    required: true
    path: condition.clinicalStatus
    default: active
  - id: verificationStatus
    definition: 病情、問題或診斷的臨床狀態的驗證狀態。
    type: code
    binding: condition-ver-status
    required: false
    path: condition.verificationStatus
    default: confirmed
  - id: category
    definition: 病情、問題或診斷的類別。
    type: code
    binding: condition-category
    required: true
    path: condition.category
    default: encounter-diagnosis
  - id: severity
    definition: 病情、問題或診斷的主觀嚴重程度。
    type: code
    binding: condition-severity
    required: false
    path: condition.severity
    default: "255604002"
  - id: conditionCode
    definition: 病情、問題或診斷的識別。
    type: code
    binding: condition-code
    required: true
    path: condition.conditionCode
  - id: conditionText
    definition: 病情、問題或診斷的識別。
    type: string
    required: true
    path: condition.conditionText
  - id: patientId
    definition: 有此病情、問題或診斷的病人。
    type: reference
    reference: subject
    required: false
    path: condition.patientId
  - id: onsetDate
    definition: 估計的或實際的日期。
    type: dateTime
    required: false
    path: condition.onsetDate
    default: $dateTime("2026-03-01T08:00:00+08:00", "2026-07-31T18:00:00+08:00")
  - id: abatementDate
    definition: 何時解決/緩解。
    type: dateTime
    required: false
    path: condition.abatementDate
  - id: asserterId
    definition: 聲稱有此病情、問題或診斷的人。
    type: reference
    reference: asserter
    required: false
    path: condition.asserterId
  - id: recorderId
    definition: 記錄此診斷的臨床人員或角色。
    type: reference
    reference: asserter
    required: false
    path: condition.recorderId
  - id: note
    definition: 診斷補充說明。
    type: string
    required: false
    path: condition.note
    default: 依臨床評估持續追蹤。
