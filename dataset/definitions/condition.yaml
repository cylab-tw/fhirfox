resourceType: condition
name: Condition
summary: 此情境納入的 Condition 原始資料。
bindings:
  encounter:
    key: encounter
    name: Scenario encounter
    resourceTypes:
      - encounter
    summary: 此情境相關就醫事件。
  patient:
    key: subject
    name: Scenario patient
    resourceTypes:
      - patient
    summary: 此情境主要病人。
  recorder:
    key: recorder
    name: Scenario recorder
    resourceTypes:
      - patient
      - practitioner
      - practitionerrole
    summary: 此情境紀錄者。
fields:
  - id: id
    name: Id
    summary: 邏輯 ID
    type: string
    path: Condition.id
    cardinality: 0..1
    fhirMapping: Condition.id
    required: true
  - id: clinicalStatus
    name: Clinical Status
    summary: 臨床狀態
    type: code
    path: Condition.clinicalStatus
    cardinality: 0..1
    fhirMapping: Condition.clinicalStatus
    required: false
    default: active
  - id: verificationStatus
    name: Verification Status
    summary: 驗證狀態
    type: code
    path: Condition.verificationStatus
    cardinality: 0..1
    fhirMapping: Condition.verificationStatus
    required: false
    default: confirmed
  - id: category
    name: Category
    summary: 分類
    type: code
    path: Condition.category
    cardinality: 0..1
    fhirMapping: Condition.category
    required: false
    default: encounter-diagnosis
  - id: severity
    name: Severity
    summary: 嚴重程度
    type: code
    path: Condition.severity
    cardinality: 0..1
    fhirMapping: Condition.severity
    required: false
  - id: conditionCode
    name: Condition Code
    summary: 疾病/問題代碼
    type: code
    path: Condition.code.coding.code
    cardinality: 0..1
    fhirMapping: Condition.code.coding.code
    required: false
  - id: conditionText
    name: Condition Text
    summary: 疾病/問題名稱
    type: string
    path: Condition.code.text
    cardinality: 0..1
    fhirMapping: Condition.code.text
    required: false
  - id: patientId
    name: Patient Id
    summary: 病人
    type: reference
    path: Condition.subject.reference
    cardinality: 0..1
    fhirMapping: Condition.subject.reference
    required: false
    reference:
      binding: patient
  - id: encounterId
    name: Encounter Id
    summary: 就醫紀錄
    type: reference
    path: Condition.encounter.reference
    cardinality: 0..1
    fhirMapping: Condition.encounter.reference
    required: false
    reference:
      binding: encounter
  - id: onsetDate
    name: Onset Date
    summary: 發病時間
    type: datetime
    path: Condition.onsetDateTime
    cardinality: 0..1
    fhirMapping: Condition.onsetDateTime
    required: false
  - id: abatementDate
    name: Abatement Date
    summary: 緩解/解決時間
    type: datetime
    path: Condition.abatementDateTime
    cardinality: 0..1
    fhirMapping: Condition.abatementDateTime
    required: false
  - id: recordedDate
    name: Recorded Date
    summary: 記錄日期
    type: datetime
    path: Condition.recordedDate
    cardinality: 0..1
    fhirMapping: Condition.recordedDate
    required: false
    default: $dateTime()
    input:
      between:
        - 2026-03-01T08:00:00+08:00
        - 2026-07-31T18:00:00+08:00
  - id: recorderId
    name: Recorder Id
    summary: 記錄者
    type: reference
    path: Condition.recorder.reference
    cardinality: 0..1
    fhirMapping: Condition.recorder.reference
    required: false
    reference:
      binding: recorder
  - id: note
    name: Note
    summary: 備註
    type: string
    path: Condition.note.text
    cardinality: 0..1
    fhirMapping: Condition.note.text
    required: false
