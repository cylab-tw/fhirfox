resourceType: encounter
name: Encounter
summary: 表示一次門診、急診或住院就醫事件，串接病人、機構、參與人員與診斷脈絡。
bindings:
  condition:
    key: condition
    name: Scenario condition
    resourceTypes:
      - condition
    summary: 此情境診斷/處置。
  patient:
    key: subject
    name: Scenario patient
    resourceTypes:
      - patient
    summary: 此情境主要病人。
  practitioner:
    key: practitioner
    name: Scenario practitioner
    resourceTypes:
      - practitionerrole
      - practitioner
    summary: 此情境醫事人員。
  serviceProvider:
    key: provider
    name: Scenario service provider
    resourceTypes:
      - organization
    summary: 此情境主要照護或資料提供機構。
fields:
  - id: id
    name: Id
    summary: 來源 HIS 就醫識別碼
    type: string
    path: Encounter.identifier.value
    cardinality: 0..1
    required: true
    default: $id("encounter")
  - id: idSystem
    name: Id System
    summary: 就醫識別碼系統
    type: string
    path: Encounter.identifier.system
    cardinality: 0..1
    required: false
    default: https://fhirfox.dev/identifier-system/encounter
  - id: status
    name: Status
    summary: 就醫狀態
    type: code
    path: Encounter.status
    cardinality: 0..1
    required: false
    default: finished
  - id: class
    name: Class
    summary: 就醫分類
    type: code
    path: Encounter.class
    cardinality: 0..1
    required: false
    default: $case()
    input:
      source: encounterProfile
      default: AMB
      cases:
        family-medicine-outpatient:
          serviceType: "01"
        pediatrics-outpatient:
          serviceType: "10"
        endocrinology-outpatient:
          serviceType: endo
        cardiology-outpatient:
          serviceType: cardiology
        emergency-visit:
          class: EMER
          serviceType: emergency
        emergency-visit-from-ed:
          class: EMER
          serviceType: emergency
          admitSource: emd
        inpatient-stay-from-ed-home:
          class: IMP
          serviceType: inpatient
          admitSource: emd
          dischargeDisposition: home
        cardiology-inpatient-discharge-home:
          class: IMP
          serviceType: cardiology
          dischargeDisposition: home
  - id: type
    name: Type
    summary: 就醫種類。
    type: string
    path: Encounter.type
    cardinality: 0..1
    required: false
  - id: patientId
    name: Patient Id
    summary: 就醫病人
    type: reference
    path: Encounter.subject.reference
    cardinality: 0..1
    required: false
    reference:
      binding: patient
  - id: periodStart
    name: Period Start
    summary: 開始時間
    type: datetime
    path: Encounter.period.start
    cardinality: 0..1
    required: false
    default: $dateTime()
    input:
      between:
        - 2026-03-01T08:00:00+08:00
        - 2026-07-31T18:00:00+08:00
  - id: periodEnd
    name: Period End
    summary: 結束時間
    type: datetime
    path: Encounter.period.end
    cardinality: 0..1
    required: false
    default: $addMinutes($value('periodStart'), 25)
  - id: participantType
    name: Participant Type
    summary: 參與者角色
    type: code
    path: Encounter.participant.type
    cardinality: 0..1
    required: false
    default: ATND
  - id: practitionerId
    name: Practitioner Id
    summary: 醫事人員
    type: reference
    path: Encounter.participant.individual.reference
    cardinality: 0..1
    required: false
    reference:
      binding: practitioner
  - id: conditionId
    name: Condition Id
    summary: 診斷/處置
    type: reference
    path: Encounter.diagnosis.condition.reference
    cardinality: 0..1
    required: false
    reference:
      binding: condition
  - id: diagnosisUse
    name: Diagnosis Use
    summary: 診斷作用
    type: code
    path: Encounter.diagnosis.use
    cardinality: 0..1
    required: false
    default: AD
  - id: admitSource
    name: Admit Source
    summary: 入院來源
    type: code
    path: Encounter.hospitalization.admitSource
    cardinality: 0..1
    required: false
    default: $case()
    input:
      source: encounterProfile
      cases: &a1
        family-medicine-outpatient:
          serviceType: "01"
        pediatrics-outpatient:
          serviceType: "10"
        endocrinology-outpatient:
          serviceType: endo
        cardiology-outpatient:
          serviceType: cardiology
        emergency-visit:
          class: EMER
          serviceType: emergency
        emergency-visit-from-ed:
          class: EMER
          serviceType: emergency
          admitSource: emd
        inpatient-stay-from-ed-home:
          class: IMP
          serviceType: inpatient
          admitSource: emd
          dischargeDisposition: home
        cardiology-inpatient-discharge-home:
          class: IMP
          serviceType: cardiology
          dischargeDisposition: home
  - id: dischargeDisposition
    name: Discharge Disposition
    summary: 出院處置
    type: code
    path: Encounter.hospitalization.dischargeDisposition
    cardinality: 0..1
    required: false
    default: $case()
    input:
      source: encounterProfile
      cases: *a1
  - id: serviceType
    name: Service Type
    summary: 就醫科別
    type: code
    path: Encounter.serviceType
    cardinality: 0..1
    required: false
    default: $case()
    input:
      source: encounterProfile
      cases: *a1
  - id: locationId
    name: Location Id
    summary: 就醫地點
    type: string
    path: Encounter.location.location.reference
    cardinality: 0..1
    required: false
  - id: serviceProviderId
    name: Service Provider Id
    summary: 主責機構
    type: reference
    path: Encounter.serviceProvider.reference
    cardinality: 0..1
    required: false
    reference:
      binding: serviceProvider
