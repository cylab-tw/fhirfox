resourceType: encounter
name: Encounter
summary: 表示病人與健康照護服務提供者互動的一次就醫事件，包含狀態、分類、病人、期間、參與人員、診斷與服務機構。

defaults:
  with:
    - encounter.tw-core-defaults

bindings:
  - encounter-status
  - encounter-type
  - v3-ActCode
  - service-type
  - condition-code
  - v3-ParticipationType
  - diagnosis-role
  - admit-source
  - discharge-disposition

references:
  subject:
    definition: 此就醫事件的病人。
    resourceTypes:
      - patient
  practitioner:
    definition: 參與此就醫事件的個人或角色。
    resourceTypes:
      - practitioner
      - practitionerrole
  condition:
    definition: 與此就醫事件相關的診斷。
    resourceTypes:
      - condition
  serviceProvider:
    key: provider
    definition: 負責此就醫事件的機構。
    resourceTypes:
      - organization

fields:
  - id: id
    definition: 就醫識別碼。
    type: identifier
    required: true
    path: encounter.id
    default: $id("encounter")
  - id: idSystem
    definition: 就醫識別碼所屬系統。
    type: string
    required: false
    path: encounter.idSystem
    default: https://www.tph.mohw.gov.tw/fhir/encounter
  - id: status
    definition: 就醫事件目前的狀態。
    type: code
    binding: encounter-status
    required: true
    path: encounter.status
    default: finished
  - id: class
    definition: 就醫事件的分類，例如門診、急診或住院。
    type: code
    binding: v3-ActCode
    required: true
    path: encounter.class
  - id: type
    definition: 就醫事件的型態。
    type: code
    binding: encounter-type
    required: false
    path: encounter.type
  - id: reasonCode
    definition: 此次就醫的主要原因。
    type: code
    binding: condition-code
    required: false
    path: encounter.reasonCode
  - id: serviceType
    definition: 就醫事件提供的服務類型或科別。
    type: code
    binding: service-type
    required: false
    path: encounter.serviceType
  - id: serviceTypeText
    definition: 就醫事件服務類型或科別文字描述。
    type: string
    required: false
    path: encounter.serviceTypeText
  - id: patientId
    definition: 此就醫事件的病人 ID。
    type: reference
    reference: subject
    required: true
    path: encounter.patientId
  - id: periodStart
    definition: 就醫事件開始時間。
    type: dateTime
    required: false
    path: encounter.periodStart
    default: $dateTime("2026-03-01T08:00:00+08:00", "2026-07-31T18:00:00+08:00")
  - id: periodEnd
    definition: 就醫事件結束時間。
    type: dateTime
    required: false
    path: encounter.periodEnd
    default: $addMinutes($value('periodStart'), 25)
  - id: serviceProviderId
    definition: 負責此就醫事件的機構 ID。
    type: reference
    reference: serviceProvider
    required: false
    path: encounter.serviceProviderId
  - id: participantType
    definition: 參與者在就醫事件中的角色。
    type: code
    binding: v3-ParticipationType
    required: false
    path: encounter.participantType
    default: ATND
  - id: practitionerId
    definition: 參與此就醫事件的人員或角色 ID。
    type: reference
    reference: practitioner
    required: false
    path: encounter.practitionerId
  - id: conditionId
    definition: 與此就醫事件相關的診斷 ID。
    type: reference
    reference: condition
    required: false
    path: encounter.conditionId
  - id: diagnosisUse
    definition: 此診斷在就醫事件中的用途。
    type: code
    binding: diagnosis-role
    required: false
    path: encounter.diagnosisUse
    default: AD
  - id: admitSource
    definition: 病人入院來源。
    type: code
    binding: admit-source
    required: false
    path: encounter.admitSource
  - id: dischargeDisposition
    definition: 病人離院或出院時的處置。
    type: code
    binding: discharge-disposition
    required: false
    path: encounter.dischargeDisposition
