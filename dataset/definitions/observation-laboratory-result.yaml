resourceType: observation-laboratory-result
name: Observation
summary: 記錄實驗室檢驗觀察結果，包含狀態、分類、項目代碼、對象、就醫事件、檢驗時間、執行者、數值、單位與參考範圍。

bindings:
  - observation-status
  - observation-category
  - observation-laboratory-result-code
  - unitsofmeasure

references:
  subject:
    definition: 此觀察結果的對象。
    resourceTypes:
      - patient
  encounter:
    definition: 與此觀察結果相關的就醫事件。
    resourceTypes:
      - encounter
  performer:
    definition: 負責產生此觀察結果的人或機構。
    resourceTypes:
      - practitioner
      - practitionerrole
      - organization
      - patient

fields:
  - id: id
    definition: 觀察結果識別碼。
    type: identifier
    required: true
    path: observation-laboratory-result.id
    default: $id("observation")
  - id: status
    definition: 觀察結果的狀態。
    type: code
    binding: observation-status
    required: true
    path: observation-laboratory-result.status
    default: final
  - id: categoryCode
    definition: 觀察結果的分類。
    type: code
    binding: observation-category
    required: true
    path: observation-laboratory-result.categoryCode
    default: laboratory
  - id: observationCode
    definition: 實驗室檢驗觀察結果的項目或代碼。
    type: code
    binding: observation-laboratory-result-code
    required: true
    path: observation-laboratory-result.observationCode
  - id: patientId
    definition: 此觀察結果對象的病人 ID。
    type: reference
    reference: subject
    required: true
    path: observation-laboratory-result.patientId
  - id: encounterId
    definition: 與此觀察結果相關的就醫事件 ID。
    type: reference
    reference: encounter
    required: false
    path: observation-laboratory-result.encounterId
  - id: effectiveDate
    definition: 觀察結果臨床相關時間。
    type: dateTime
    required: true
    path: observation-laboratory-result.effectiveDate
    default: $dateTime("2026-03-01T08:00:00+08:00", "2026-07-31T18:00:00+08:00")
  - id: performerId
    definition: 負責產生此觀察結果的人或機構 ID。
    type: reference
    reference: performer
    required: false
    path: observation-laboratory-result.performerId
  - id: valueQuantity
    definition: 觀察結果的測量數值。
    type: number
    required: false
    path: observation-laboratory-result.valueQuantity
  - id: valueUnit
    definition: 觀察結果測量數值的單位。
    type: code
    binding: unitsofmeasure
    required: false
    path: observation-laboratory-result.valueUnit
  - id: systolicValue
    definition: 血壓觀察結果中的收縮壓數值。
    type: number
    required: false
    path: observation-laboratory-result.systolicValue
  - id: systolicUnit
    definition: 血壓觀察結果中的收縮壓單位。
    type: code
    binding: unitsofmeasure
    required: false
    path: observation-laboratory-result.systolicUnit
  - id: diastolicValue
    definition: 血壓觀察結果中的舒張壓數值。
    type: number
    required: false
    path: observation-laboratory-result.diastolicValue
  - id: diastolicUnit
    definition: 血壓觀察結果中的舒張壓單位。
    type: code
    binding: unitsofmeasure
    required: false
    path: observation-laboratory-result.diastolicUnit
  - id: rangeLow
    definition: 參考範圍下限。
    type: number
    required: false
    path: observation-laboratory-result.rangeLow
  - id: rangeHigh
    definition: 參考範圍上限。
    type: number
    required: false
    path: observation-laboratory-result.rangeHigh
