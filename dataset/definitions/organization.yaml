resourceType: organization
name: Organization
summary: 描述照護或資料提供機構，包含機構識別、類型、名稱、聯絡方式與地址。

defaults:
  with:
    - organization.default-hospital

bindings:
  - organization-type
  - contact-point-system
  - contact-point-use

fields:
  - id: id
    definition: 來源資料內部機構識別碼，用於資源關聯。
    type: string
    required: true
    path: organization.id
  - id: identifierValue
    definition: 機構對外業務識別碼。
    type: identifier
    required: false
    path: organization.identifierValue
  - id: idSystem
    definition: 機構識別碼所屬系統。
    type: string
    required: false
    path: organization.idSystem
    default: https://twcore.mohw.gov.tw/ig/twcore/CodeSystem/organization-identifier-tw
  - id: active
    definition: 此基本資料是否使用中。
    type: boolean
    required: false
    path: organization.active
    default: true
  - id: type
    definition: 機構類型。
    type: code
    binding: organization-type
    required: false
    path: organization.type
    default: prov
  - id: name
    definition: 機構名稱。
    type: string
    required: true
    path: organization.name
  - id: telecomSystem
    definition: 聯絡方式類型。
    type: code
    binding: contact-point-system
    required: false
    path: organization.telecomSystem
    default: phone
  - id: telecomUse
    definition: 聯絡方式用途。
    type: code
    binding: contact-point-use
    required: false
    path: organization.telecomUse
    default: mobile
  - id: telecomValue
    definition: 聯絡方式號碼/信箱。
    type: string
    required: false
    path: organization.telecomValue
    default: $taiwanMobilePhone()
  - id: address
    definition: 機構地址。
    type: string
    required: false
    path: organization.address
    default: $taiwanAddress()
