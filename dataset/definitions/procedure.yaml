resourceType: procedure
name: Procedure
summary: 記錄已執行或正在執行的處置或手術，包含狀態、分類、代碼、病人、就醫事件、執行時間、執行者、原因、身體部位、結果與併發症。

bindings:
  - event-status
  - procedure-category
  - procedure-code
  - procedure-performer-function
  - condition-code
  - procedure-outcome
  - body-site

references:
  subject:
    definition: 接受此處置或手術的病人。
    resourceTypes:
      - patient
  encounter:
    definition: 與此處置或手術相關的就醫事件。
    resourceTypes:
      - encounter
  performer:
    definition: 執行此處置或手術的人或機構。
    resourceTypes:
      - practitioner
      - practitionerrole
      - organization
      - patient
  location:
    definition: 此處置或手術發生的地點。
    resourceTypes:
      - location

fields:
  - id: id
    definition: 處置或手術識別碼。
    type: identifier
    required: true
    path: procedure.id
  - id: status
    definition: 處置或手術的狀態。
    type: code
    binding: event-status
    required: true
    path: procedure.status
    default: completed
  - id: category
    definition: 處置或手術的分類。
    type: code
    binding: procedure-category
    required: false
    path: procedure.category
  - id: procedureCode
    definition: 處置或手術的識別代碼。
    type: code
    binding: procedure-code
    required: true
    path: procedure.procedureCode
    default: $input()
  - id: procedureText
    definition: 處置或手術的文字描述。
    type: string
    required: false
    path: procedure.procedureText
    default: $case()
    input:
      source: procedureCode
      cases:
        Proc-0006:
          procedureText: 頭部傷口縫合
        Proc-0011:
          procedureText: 住院病理切片
        Proc-0012:
          procedureText: 住院胸部 X 光檢查
        Proc-0016:
          procedureText: 急診心電圖檢查
        Proc-0030:
          procedureText: 頭部傷口換藥
        Proc-0046:
          procedureText: 冠狀動脈支架置放術
  - id: patientId
    definition: 接受此處置或手術的病人 ID。
    type: reference
    reference: subject
    required: true
    path: procedure.patientId
  - id: encounterId
    definition: 與此處置或手術相關的就醫事件 ID。
    type: reference
    reference: encounter
    required: false
    path: procedure.encounterId
  - id: performedDate
    definition: 處置或手術執行時間。
    type: dateTime
    required: false
    path: procedure.performedDate
    default: $dateTime("2026-03-01T08:00:00+08:00", "2026-07-31T18:00:00+08:00")
  - id: performerId
    definition: 執行此處置或手術的人或機構 ID。
    type: reference
    reference: performer
    required: false
    path: procedure.performerId
  - id: performerFunction
    definition: 執行者在此處置或手術中的角色。
    type: code
    binding: procedure-performer-function
    required: false
    path: procedure.performerFunction
  - id: bodySite
    definition: 處置或手術的目標身體部位。
    type: code
    binding: body-site
    required: false
    path: procedure.bodySite
  - id: reasonCode
    definition: 執行此處置或手術的原因。
    type: code
    binding: condition-code
    required: false
    path: procedure.reasonCode
  - id: outcome
    definition: 處置或手術的結果。
    type: code
    binding: procedure-outcome
    required: false
    path: procedure.outcome
    default: "385669000"
