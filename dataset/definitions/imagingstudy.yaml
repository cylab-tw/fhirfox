resourceType: imagingstudy
name: Imagingstudy
summary: 此情境納入的 ImagingStudy 原始資料。
bindings:
  encounter:
    key: encounter
    name: Scenario encounter
    resourceTypes:
      - encounter
    summary: 此情境相關就醫事件。
  patient:
    key: subject
    name: Scenario patient
    resourceTypes:
      - patient
    summary: 此情境主要病人。
fields:
  - id: id
    name: Id
    summary: 影像檢查邏輯 ID。
    type: string
    path: ImagingStudy.id
    cardinality: 0..1
    fhirMapping: ImagingStudy.id
    required: true
  - id: status
    name: Status
    summary: 影像檢查狀態。
    type: code
    path: ImagingStudy.status
    cardinality: 0..1
    fhirMapping: ImagingStudy.status
    required: false
    default: available
  - id: modalityCode
    name: Modality Code
    summary: 影像 modality 代碼。
    type: code
    path: ImagingStudy.modality
    cardinality: 0..1
    fhirMapping: ImagingStudy.modality
    required: false
    default: DX
  - id: patientId
    name: Patient Id
    summary: 病人 ID。
    type: reference
    path: ImagingStudy.subject.reference
    cardinality: 0..1
    fhirMapping: ImagingStudy.subject.reference
    required: false
    reference:
      binding: patient
  - id: encounterId
    name: Encounter Id
    summary: 就醫事件 ID。
    type: reference
    path: ImagingStudy.encounter.reference
    cardinality: 0..1
    fhirMapping: ImagingStudy.encounter.reference
    required: false
    reference:
      binding: encounter
  - id: started
    name: Started
    summary: 影像檢查開始時間。
    type: datetime
    path: ImagingStudy.started
    cardinality: 0..1
    fhirMapping: ImagingStudy.started
    required: false
    default: $dateTime()
    input:
      between:
        - 2026-03-01T08:00:00+08:00
        - 2026-07-31T18:00:00+08:00
  - id: numberOfSeries
    name: Number Of Series
    summary: 影像序列數。
    type: number
    path: ImagingStudy.numberOfSeries
    cardinality: 0..1
    fhirMapping: ImagingStudy.numberOfSeries
    required: false
    default: 1
  - id: numberOfInstances
    name: Number Of Instances
    summary: 影像實例數。
    type: number
    path: ImagingStudy.numberOfInstances
    cardinality: 0..1
    fhirMapping: ImagingStudy.numberOfInstances
    required: false
    default: 1
  - id: studyDescription
    name: Study Description
    summary: 影像檢查描述。
    type: string
    path: ImagingStudy.description
    cardinality: 0..1
    fhirMapping: ImagingStudy.description
    required: false
