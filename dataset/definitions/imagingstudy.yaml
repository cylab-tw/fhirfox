resourceType: imagingstudy
name: ImagingStudy
summary: 描述一次 DICOM 影像檢查，包含狀態、modality、檢查對象、就醫事件、開始時間、影像數量與檢查說明。

bindings:
  - imagingstudy-status
  - imaging-modality

references:
  subject:
    definition: 影像檢查的對象。
    resourceTypes:
      - patient
  encounter:
    definition: 與此影像檢查相關的就醫事件。
    resourceTypes:
      - encounter

fields:
  - id: id
    definition: 影像檢查識別碼。
    type: identifier
    required: true
    path: imagingstudy.id
  - id: status
    definition: 影像檢查目前的狀態。
    type: code
    binding: imagingstudy-status
    required: true
    path: imagingstudy.status
    default: available
  - id: modalityCode
    definition: 實際取得影像資料的儀器類型。
    type: code
    binding: imaging-modality
    required: false
    path: imagingstudy.modalityCode
    default: DX
  - id: patientId
    definition: 影像檢查對象的病人 ID。
    type: reference
    reference: subject
    required: true
    path: imagingstudy.patientId
  - id: encounterId
    definition: 與此影像檢查相關的就醫事件 ID。
    type: reference
    reference: encounter
    required: false
    path: imagingstudy.encounterId
  - id: started
    definition: 影像檢查開始時間。
    type: dateTime
    required: false
    path: imagingstudy.started
    default: $dateTime("2026-03-01T08:00:00+08:00", "2026-07-31T18:00:00+08:00")
  - id: numberOfSeries
    definition: 此影像檢查相關的影像序列數。
    type: number
    required: false
    path: imagingstudy.numberOfSeries
    default: 1
  - id: numberOfInstances
    definition: 此影像檢查相關的影像實例數。
    type: number
    required: false
    path: imagingstudy.numberOfInstances
    default: 1
  - id: studyDescription
    definition: 機構產生的影像檢查描述。
    type: string
    required: false
    path: imagingstudy.studyDescription
