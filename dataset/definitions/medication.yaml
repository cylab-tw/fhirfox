resourceType: medication
name: Medication
summary: 定義可用於處方、配藥或給藥的藥品，包含藥品代碼與顯示名稱。

bindings:
  - medication-code

fields:
  - id: id
    definition: 藥品識別碼。
    type: identifier
    required: true
    path: medication.id
  - id: code
    definition: 藥品的識別代碼。
    type: code
    binding: medication-code
    required: true
    path: medication.code
    default: $input()
  - id: display
    definition: 藥品名稱或文字描述。
    type: string
    required: false
    path: medication.display
    default: $case()
    input:
      source: code
      cases:
        Med-0001:
          display: Acetaminophen 500 mg
        Med-0032:
          display: Amlodipine 5 mg tablet
        Med-0003:
          display: Amlodipine 5 mg
        Med-0025:
          display: Aspirin 100 mg tablet
        Med-0005:
          display: Aspirin 100 mg
        Med-0038:
          display: Atorvastatin 20 mg tablet
        Med-0006:
          display: Ceftriaxone injection 1 g
        Med-0040:
