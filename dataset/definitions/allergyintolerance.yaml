resourceType: allergyintolerance
name: AllergyIntolerance
summary: 記錄病人的過敏或不良反應風險，包含過敏原、嚴重度、反應表現與紀錄者。

defaults:
  with:
    - allergyintolerance.shrimp-allergy

bindings:
  - allergyintolerance-clinical
  - allergyintolerance-verification
  - allergy-intolerance-type
  - allergy-intolerance-category
  - allergy-intolerance-criticality
  - allergyintolerance-code
  - substance-code
  - allergy-manifestation
  - reaction-event-severity
  - route-codes

references:
  subject:
    definition: 此過敏或不耐受的病人。
    resourceTypes:
      - patient
  encounter:
    definition: 與此過敏或不耐受紀錄相關的就醫事件。
    resourceTypes:
      - encounter
  recorder:
    definition: 此過敏或不耐受資訊的記錄者。
    resourceTypes:
      - practitioner
      - practitionerrole
      - patient
  asserter:
    definition: 聲明或確認此過敏或不耐受資訊的人。
    resourceTypes:
      - patient
      - practitioner
      - practitionerrole

fields:
  - id: id
    definition: 過敏紀錄識別碼。
    type: identifier
    required: true
    path: allergyintolerance.id
  - id: clinicalStatus
    definition: 過敏或不耐受的臨床狀態。
    type: code
    binding: allergyintolerance-clinical
    required: false
    path: allergyintolerance.clinicalStatus
    default: active
  - id: verificationStatus
    definition: 關於對特定物質反應的傾向或潜在風險的確定性聲明。
    type: code
    binding: allergyintolerance-verification
    required: false
    path: allergyintolerance.verificationStatus
    default: confirmed
  - id: type
    definition: 過敏類型。
    type: code
    binding: allergy-intolerance-type
    required: false
    path: allergyintolerance.type
    default: allergy
  - id: category
    definition: 過敏原類別。
    type: code
    binding: allergy-intolerance-category
    required: false
    path: allergyintolerance.category
    default: food
  - id: criticality
    definition: 過敏嚴重性。
    type: code
    binding: allergy-intolerance-criticality
    required: false
    path: allergyintolerance.criticality
    default: low
  - id: allergyCode
    definition: 指明此過敏或不耐受的代碼。
    type: code
    binding: allergyintolerance-code
    required: true
    path: allergyintolerance.allergyCode
  - id: patientId
    definition: 此過敏或不耐受的病人 ID。
    type: reference
    reference: subject
    required: true
    path: allergyintolerance.patientId
  - id: encounterId
    definition: 此情境相關就醫事件 ID。
    type: reference
    reference: encounter
    required: true
    path: allergyintolerance.encounterId
  - id: onsetDate
    definition: 發作時間。
    type: dateTime
    required: false
    path: allergyintolerance.onsetDate
  - id: recordedDate
    definition: 紀錄日期。
    type: dateTime
    required: false
    path: allergyintolerance.recordedDate
  - id: recorderId
    definition: 紀錄者 ID。
    type: reference
    reference: recorder
    required: false
    path: allergyintolerance.recorderId
  - id: asserterId
    definition: 發作者 ID。
    type: reference
    reference: asserter
    required: false
    path: allergyintolerance.asserterId
  - id: lastOccurrence
    definition: 最後一次發生時間。
    type: dateTime
    required: false
    path: allergyintolerance.lastOccurrence
  - id: reactionSubstance
    definition: 不良反應物質。
    type: code
    binding: substance-code
    required: false
    path: allergyintolerance.reactionSubstance
  - id: manifestation
    definition: 不良反應症狀。
    type: code
    binding: allergy-manifestation
    required: true
    path: allergyintolerance.manifestation
  - id: reactionDescription
    definition: 不良反應描述。
    type: string
    required: false
    path: allergyintolerance.reactionDescription
  - id: severity
    definition: 不良反應嚴重程度。
    type: code
    binding: reaction-event-severity
    required: false
    path: allergyintolerance.severity
  - id: exposureRoute
    definition: 不良反應接觸途徑。
    type: code
    binding: route-codes
    required: false
    path: allergyintolerance.exposureRoute
  - id: note
    definition: 不良反應備註。
    type: string
    required: false
    path: allergyintolerance.note
