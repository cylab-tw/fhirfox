resourceType: practitioner
name: Practitioner
summary: 描述直接或間接參與照護的健康照護服務提供者，包含識別、姓名、聯絡方式、性別、生日與資格。

bindings:
  - administrative-gender
  - contact-point-system
  - contact-point-use
  - practitioner-qualification-code

references:
  qualificationIssuer:
    key: provider
    definition: 核發此人員資格的機構。
    resourceTypes:
      - organization

fields:
  - id: id
    definition: 健康照護服務提供者識別碼。
    type: identifier
    required: true
    path: practitioner.id
  - id: medicalLicenseNumber
    definition: 健康照護服務提供者的醫事人員證書號碼。
    type: string
    required: true
    path: practitioner.medicalLicenseNumber
    default: $random()
    input:
      oneOf:
        - 醫字第012345號
        - 醫字第045678號
        - 醫字第078901號
        - 醫字第102345號
        - 醫字第135790號
  - id: medicalLicenseSystem
    definition: 醫事人員證書號碼所屬系統。
    type: string
    required: true
    path: practitioner.medicalLicenseSystem
    default: https://www.tph.mohw.gov.tw/fhir/practitioner-license
  - id: active
    definition: 此人員紀錄是否使用中。
    type: boolean
    required: false
    path: practitioner.active
    default: true
  - id: name
    definition: 健康照護服務提供者姓名。
    type: string
    required: true
    path: practitioner.name
    default: $humanName()
  - id: telecomSystem
    definition: 聯絡方式類型。
    type: code
    binding: contact-point-system
    required: false
    path: practitioner.telecomSystem
    default: phone
  - id: telecomUse
    definition: 聯絡方式用途。
    type: code
    binding: contact-point-use
    required: false
    path: practitioner.telecomUse
    default: work
  - id: telecomValue
    definition: 聯絡方式號碼/信箱。
    type: string
    required: false
    path: practitioner.telecomValue
    default: $taiwanMobilePhone()
  - id: address
    definition: 聯絡地址。
    type: string
    required: false
    path: practitioner.address
    default: $taiwanAddress()
  - id: gender
    definition: 性別。
    type: code
    binding: administrative-gender
    required: false
    path: practitioner.gender
    default: $random()
  - id: birthday
    definition: 出生日期。
    type: date
    required: false
    path: practitioner.birthday
    default: $birthDate(25, 75)
  - id: qualificationCode
    definition: 健康照護服務提供者的資格或證照。
    type: code
    binding: practitioner-qualification-code
    required: false
    path: practitioner.qualificationCode
    default: Qual-0001
  - id: qualificationIssuer
    definition: 核發資格或證照的機構 ID。
    type: reference
    reference: qualificationIssuer
    required: false
    path: practitioner.qualificationIssuer
