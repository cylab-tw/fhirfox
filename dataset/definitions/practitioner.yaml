resourceType: practitioner
name: Practitioner
summary: 描述參與照護的醫事人員，包含人員識別、姓名、資格與所屬機構。
bindings:
  organization:
    key: provider
    name: Scenario organization
    resourceTypes:
      - organization
    summary: 此情境主要照護或資料提供機構。
fields:
  - id: id
    name: Id
    summary: 來源 HIS 醫事人員識別碼
    type: string
    path: Practitioner.identifier.value
    cardinality: 0..1
    fhirMapping: Practitioner.identifier.value
    required: true
  - id: idSystem
    name: Id System
    summary: 來源 HIS 醫事人員識別碼系統
    type: string
    path: Practitioner.identifier.system
    cardinality: 0..1
    fhirMapping: Practitioner.identifier.system
    required: false
    default: https://fhirfox.dev/identifier-system/practitioner
  - id: identityNumber
    name: Identity Number
    summary: 證件號碼
    type: string
    path: Practitioner.identifier.value
    cardinality: 0..1
    fhirMapping: Practitioner.identifier.value
    required: false
    default: $taiwanNationalId()
  - id: identityType
    name: Identity Type
    summary: 證件類型
    type: code
    path: Practitioner.identifier.type.coding.code
    cardinality: 0..1
    fhirMapping: Practitioner.identifier.type.coding.code
    required: false
    default: NNxxx
  - id: active
    name: Active
    summary: 紀錄狀態
    type: boolean
    path: Practitioner.active
    cardinality: 0..1
    fhirMapping: Practitioner.active
    required: false
    default: true
  - id: name
    name: Name
    summary: 姓名
    type: string
    path: Practitioner.name.text
    cardinality: 0..1
    fhirMapping: Practitioner.name.text
    required: false
    default: $humanName()
  - id: telecomSystem
    name: Telecom System
    summary: 聯絡方式類型
    type: code
    path: Practitioner.telecom.system
    cardinality: 0..1
    fhirMapping: Practitioner.telecom.system
    required: false
    default: phone
  - id: telecomUse
    name: Telecom Use
    summary: 聯絡方式用途
    type: code
    path: Practitioner.telecom.use
    cardinality: 0..1
    fhirMapping: Practitioner.telecom.use
    required: false
    default: work
  - id: telecomValue
    name: Telecom Value
    summary: 聯絡號碼/信箱
    type: string
    path: Practitioner.telecom.value
    cardinality: 0..1
    fhirMapping: Practitioner.telecom.value
    required: false
    default: $taiwanMobilePhone()
  - id: address
    name: Address
    summary: 通訊地址
    type: string
    path: Practitioner.address.text
    cardinality: 0..1
    fhirMapping: Practitioner.address.text
    required: false
    default: $taiwanAddress()
  - id: gender
    name: Gender
    summary: 人員性別
    type: code
    path: Practitioner.gender
    cardinality: 0..1
    fhirMapping: Practitioner.gender
    required: false
  - id: birthday
    name: Birthday
    summary: 出生日期
    type: date
    path: Practitioner.birthDate
    cardinality: 0..1
    fhirMapping: Practitioner.birthDate
    required: false
    default: $birthDate()
    input:
      gte: 25
      lte: 75
  - id: qualificationCode
    name: Qualification Code
    summary: 醫事人員類別
    type: code
    path: Practitioner.qualification.code.coding.code
    cardinality: 0..1
    fhirMapping: Practitioner.qualification.code.coding.code
    required: false
    default: Qual-0001
  - id: qualificationIssuer
    name: Qualification Issuer
    summary: 證書發行機構
    type: reference
    path: Practitioner.qualification.issuer.reference
    cardinality: 0..1
    fhirMapping: Practitioner.qualification.issuer.reference
    required: false
    reference:
      binding: organization
