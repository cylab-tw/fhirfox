observation:
  description: 此情境納入的 Observation 原始資料。
  cardinality: 0..*
  id:
    description: 觀察資料邏輯 ID。
    fhirMapping: Observation.id
    cardinality: 0..1
    required: true
  status:
    description: 觀察狀態。
    fhirMapping: Observation.status
    cardinality: 0..1
  categoryCode:
    description: 觀察分類。
    fhirMapping: Observation.category
    cardinality: 0..1
  observationCode:
    description: 觀察項目代碼。
    fhirMapping: Observation.code.coding.code
    cardinality: 0..1
  patientId:
    description: 病人 ID。
    fhirMapping: Observation.subject.reference
    cardinality: 0..1
    reference: patient
  encounterId:
    description: 就醫事件 ID。
    fhirMapping: Observation.encounter.reference
    cardinality: 0..1
    reference: encounter
  effectiveDate:
    description: 檢查或量測時間。
    fhirMapping: Observation.effectiveDateTime
    cardinality: 0..1
  performerId:
    description: 執行者。
    fhirMapping: Observation.performer.reference
    cardinality: 0..1
    reference:
      - careteam
      - organization
      - patient
      - practitioner
      - practitionerrole
  performerType:
    description: 執行者資源類型，用於在共用 ID 時判斷 Observation.performer.reference 應指向哪種資源。
    cardinality: 0..1
  valueQuantity:
    description: 數值結果。
    fhirMapping: Observation.valueQuantity.value
    cardinality: 0..1
  valueUnit:
    description: 數值單位。
    fhirMapping: Observation.valueQuantity.unit
    cardinality: 0..1
  dataAbsentReason:
    description: 無資料原因。
    fhirMapping: Observation.dataAbsentReason
    cardinality: 0..1
  rangeLow:
    description: 參考下限。
    fhirMapping: Observation.referenceRange.low
    cardinality: 0..1
  rangeHigh:
    description: 參考上限。
    fhirMapping: Observation.referenceRange.high
    cardinality: 0..1
  systolicValue:
    description: 收縮壓數值。
    fhirMapping: Observation.component.valueQuantity.value
    cardinality: 0..1
  diastolicValue:
    description: 舒張壓數值。
    fhirMapping: Observation.component.valueQuantity.value
    cardinality: 0..1
