observation:
  description: 此情境納入的 Observation 原始資料。
  cardinality: 0..*
  id:
    description: 邏輯 ID
    fhirMapping: Observation.id
    cardinality: 0..1
    required: true
  status:
    description: 狀態
    fhirMapping: Observation.status
    cardinality: 0..1
  categoryCode:
    description: 分類代碼
    fhirMapping: Observation.category
    cardinality: 0..1
  observationCode:
    description: 量測項目
    fhirMapping: Observation.code.coding.code
    cardinality: 0..1
  patientId:
    description: 病人
    fhirMapping: Observation.subject.reference
    cardinality: 0..1
    reference: patient
  encounterId:
    description: 就醫紀錄
    fhirMapping: Observation.encounter.reference
    cardinality: 0..1
    reference: encounter
  effectiveDate:
    description: 量測時間
    fhirMapping: Observation.effectiveDateTime
    cardinality: 0..1
  performerId:
    description: 量測人員
    fhirMapping: Observation.performer.reference
    cardinality: 0..1
    reference:
      - careteam
      - organization
      - patient
      - practitioner
      - practitionerrole
  performerType:
    description: 執行者資源類型，用於在共用 ID 時判斷 Observation.performer.reference 應指向哪種資源。
    cardinality: 0..1
  valueQuantity:
    description: 測量數值
    fhirMapping: Observation.valueQuantity.value
    cardinality: 0..1
  valueUnit:
    description: 測量單位
    fhirMapping: Observation.valueQuantity.unit
    cardinality: 0..1
  dataAbsentReason:
    description: 缺失原因
    fhirMapping: Observation.dataAbsentReason
    cardinality: 0..1
  rangeLow:
    description: 參考下限
    fhirMapping: Observation.referenceRange.low
    cardinality: 0..1
  rangeHigh:
    description: 參考上限
    fhirMapping: Observation.referenceRange.high
    cardinality: 0..1
  systolicValue:
    description: 收縮壓數值
    fhirMapping: Observation.component.valueQuantity.value
    cardinality: 0..1
  diastolicValue:
    description: 舒張壓數值
    fhirMapping: Observation.component.valueQuantity.value
    cardinality: 0..1
