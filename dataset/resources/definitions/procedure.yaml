procedure:
  description: 此情境納入的 Procedure 原始資料。
  cardinality: 0..*
  id:
    description: 處置邏輯 ID。
    fhirMapping: Procedure.id
    cardinality: 0..1
    required: true
  status:
    description: 處置狀態。
    fhirMapping: Procedure.status
    cardinality: 0..1
  statusReason:
    description: 處置狀態原因。
    fhirMapping: Procedure.statusReason
    cardinality: 0..1
  category:
    description: 處置分類。
    fhirMapping: Procedure.category
    cardinality: 0..1
  procedureCode:
    description: 處置代碼。
    fhirMapping: Procedure.code.coding.code
    cardinality: 0..1
  procedureText:
    description: 處置名稱或說明。
    fhirMapping: Procedure.code.text
    cardinality: 0..1
  patientId:
    description: 病人 ID。
    fhirMapping: Procedure.subject.reference
    cardinality: 0..1
    reference: patient
  encounterId:
    description: 就醫事件 ID。
    fhirMapping: Procedure.encounter.reference
    cardinality: 0..1
    reference: encounter
  performedDate:
    description: 執行時間。
    fhirMapping: Procedure.performedDateTime
    cardinality: 0..1
  performerId:
    description: 執行者。
    fhirMapping: Procedure.performer.actor.reference
    cardinality: 0..1
    reference:
      - device
      - organization
      - patient
      - practitioner
      - practitionerrole
      - relatedperson
  performerType:
    description: 執行者資源類型，用於在共用 ID 時判斷 Procedure.performer.actor.reference 應指向哪種資源。
    cardinality: 0..1
  performerFunction:
    description: 執行角色。
    fhirMapping: Procedure.performer.function
    cardinality: 0..1
  locationId:
    description: 執行地點。
    fhirMapping: Procedure.location.reference
    cardinality: 0..1
  reasonCode:
    description: 處置原因。
    fhirMapping: Procedure.reasonCode
    cardinality: 0..1
  bodySite:
    description: 身體部位。
    fhirMapping: Procedure.bodySite
    cardinality: 0..1
  outcome:
    description: 處置結果。
    fhirMapping: Procedure.outcome
    cardinality: 0..1
  complication:
    description: 併發症。
    fhirMapping: Procedure.complication
    cardinality: 0..1
