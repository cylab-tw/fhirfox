organization:
  description: 此情境納入的 Organization 原始資料。
  cardinality: 0..*
  id:
    description: 邏輯 ID
    fhirMapping: Organization.id
    cardinality: 0..1
    required: true
  active:
    description: 紀錄狀態
    fhirMapping: Organization.active
    cardinality: 0..1
  idType:
    description: 機構識別碼類型
    fhirMapping: Organization.identifier.type.coding.code
    cardinality: 0..1
  idNumber:
    description: 機構識別碼
    fhirMapping: Organization.identifier.value
    cardinality: 0..1
  type:
    description: 機構類型
    fhirMapping: Organization.type.coding.code
    cardinality: 0..1
  name:
    description: 機構名稱
    fhirMapping: Organization.name
    cardinality: 0..1
  alias:
    description: 其他名稱(別名)
    fhirMapping: Organization.alias
    cardinality: 0..1
  telecomSystem:
    description: 聯絡方式類型
    fhirMapping: Organization.telecom.system
    cardinality: 0..1
  telecomValue:
    description: 聯絡號碼/信箱
    fhirMapping: Organization.telecom.value
    cardinality: 0..1
  telecomUse:
    description: 聯絡方式用途
    fhirMapping: Organization.telecom.use
    cardinality: 0..1
  address:
    description: 機構地址
    fhirMapping: Organization.address.text
    cardinality: 0..1
