medicationrequest:
  description: 此情境納入的 MedicationRequest 原始資料。
  cardinality: 0..*
  id:
    description: 邏輯 ID
    fhirMapping: MedicationRequest.id
    cardinality: 0..1
    required: true
  status:
    description: 狀態
    fhirMapping: MedicationRequest.status
    cardinality: 0..1
  intent:
    description: 意圖
    fhirMapping: MedicationRequest.intent
    cardinality: 0..1
  medicationId:
    description: 藥品參照
    fhirMapping: MedicationRequest.medicationReference.reference
    cardinality: 0..1
    reference: medication
  patientId:
    description: 病人
    fhirMapping: MedicationRequest.subject.reference
    cardinality: 0..1
    reference: patient
  encounterId:
    description: 就醫紀錄
    fhirMapping: MedicationRequest.encounter.reference
    cardinality: 0..1
    reference: encounter
  authoredOn:
    description: 開立時間
    fhirMapping: MedicationRequest.authoredOn
    cardinality: 0..1
  requesterId:
    description: 開立者
    fhirMapping: MedicationRequest.requester.reference
    cardinality: 0..1
    reference:
      - practitioner
      - practitionerrole
  requesterType:
    description: 開立者資源類型，用於在共用 ID 時判斷 MedicationRequest.requester.reference 應指向哪種資源。
    cardinality: 0..1
  reasonReferenceId:
    description: 開立原因參照
    fhirMapping: MedicationRequest.reasonReference.reference
    cardinality: 0..1
    reference: condition
  dosageText:
    description: 用法說明
    fhirMapping: MedicationRequest.dosageInstruction.text
    cardinality: 0..1
  doseValue:
    description: 每次劑量
    fhirMapping: MedicationRequest.dosageInstruction.doseAndRate.doseQuantity.value
    cardinality: 0..1
  doseUnit:
    description: 劑量單位
    fhirMapping: MedicationRequest.dosageInstruction.doseAndRate.doseQuantity.code
    cardinality: 0..1
  frequency:
    description: 用藥頻率。
    fhirMapping: MedicationRequest.dosageInstruction.timing.repeat.frequency
    cardinality: 0..1
  period:
    description: 用藥頻率週期。
    fhirMapping: MedicationRequest.dosageInstruction.timing.repeat.period
    cardinality: 0..1
  periodUnit:
    description: 用藥頻率週期單位。
    fhirMapping: MedicationRequest.dosageInstruction.timing.repeat.periodUnit
    cardinality: 0..1
  durationValue:
    description: 處方天數
    fhirMapping: MedicationRequest.dispenseRequest.expectedSupplyDuration.value
    cardinality: 0..1
  durationUnit:
    description: 預期供藥天數或期間單位。
    fhirMapping: MedicationRequest.dispenseRequest.expectedSupplyDuration.code
    cardinality: 0..1
