patient:
  description: 此情境納入的 Patient 原始資料。
  cardinality: 0..*
  id:
    description: 病人邏輯 ID。
    fhirMapping: Patient.id
    cardinality: 0..1
    required: true
  idType:
    description: 證件類型。
    fhirMapping: Patient.identifier.type.coding.code
    cardinality: 0..1
  idNumber:
    description: 證件號碼。
    fhirMapping: Patient.identifier.value
    cardinality: 0..1
  active:
    description: 紀錄狀態。
    fhirMapping: Patient.active
    cardinality: 0..1
  name:
    description: 病人姓名。
    fhirMapping: Patient.name.text
    cardinality: 0..1
  telecomSystem:
    description: 聯絡方式類型。
    fhirMapping: Patient.telecom.system
    cardinality: 0..1
  telecomValue:
    description: 聯絡號碼或信箱。
    fhirMapping: Patient.telecom.value
    cardinality: 0..1
  telecomUse:
    description: 聯絡方式用途。
    fhirMapping: Patient.telecom.use
    cardinality: 0..1
  gender:
    description: 病人性別。
    fhirMapping: Patient.gender
    cardinality: 0..1
  birthday:
    description: 出生日期。
    fhirMapping: Patient.birthDate
    cardinality: 0..1
  address:
    description: 通訊地址。
    fhirMapping: Patient.address.text
    cardinality: 0..1
  organization:
    description: 管理機構。
    fhirMapping: Patient.managingOrganization.reference
    cardinality: 0..1
    reference: organization
