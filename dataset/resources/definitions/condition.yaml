condition:
  description: 此情境納入的 Condition 原始資料。
  cardinality: 0..*
  id:
    description: 病況邏輯 ID。
    fhirMapping: Condition.id
    cardinality: 0..1
    required: true
  clinicalStatus:
    description: 臨床狀態。
    fhirMapping: Condition.clinicalStatus
    cardinality: 0..1
  verificationStatus:
    description: 確認狀態。
    fhirMapping: Condition.verificationStatus
    cardinality: 0..1
  category:
    description: 病況分類。
    fhirMapping: Condition.category
    cardinality: 0..1
  severity:
    description: 嚴重度。
    fhirMapping: Condition.severity
    cardinality: 0..1
  conditionCode:
    description: 診斷代碼。
    fhirMapping: Condition.code.coding.code
    cardinality: 0..1
  conditionText:
    description: 診斷文字。
    fhirMapping: Condition.code.text
    cardinality: 0..1
  patientId:
    description: 病人 ID。
    fhirMapping: Condition.subject.reference
    cardinality: 0..1
    reference: patient
  encounterId:
    description: 就醫事件 ID。
    fhirMapping: Condition.encounter.reference
    cardinality: 0..1
    reference: encounter
  onsetDate:
    description: 發病時間。
    fhirMapping: Condition.onsetDateTime
    cardinality: 0..1
  abatementDate:
    description: 緩解時間。
    fhirMapping: Condition.abatementDateTime
    cardinality: 0..1
  recordedDate:
    description: 紀錄日期。
    fhirMapping: Condition.recordedDate
    cardinality: 0..1
  recorderId:
    description: 紀錄者。
    fhirMapping: Condition.recorder.reference
    cardinality: 0..1
    reference:
      - patient
      - practitioner
      - practitionerrole
      - relatedperson
  recorderType:
    description: 紀錄者資源類型，用於在共用 ID 時判斷 Condition.recorder.reference 應指向哪種資源。
    cardinality: 0..1
  note:
    description: 備註。
    fhirMapping: Condition.note.text
    cardinality: 0..1
