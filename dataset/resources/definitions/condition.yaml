condition:
  description: 此情境納入的 Condition 原始資料。
  cardinality: 0..*
  id:
    description: 邏輯 ID
    fhirMapping: Condition.id
    cardinality: 0..1
    required: true
  clinicalStatus:
    description: 臨床狀態
    fhirMapping: Condition.clinicalStatus
    cardinality: 0..1
  verificationStatus:
    description: 驗證狀態
    fhirMapping: Condition.verificationStatus
    cardinality: 0..1
  category:
    description: 分類
    fhirMapping: Condition.category
    cardinality: 0..1
  severity:
    description: 嚴重程度
    fhirMapping: Condition.severity
    cardinality: 0..1
  conditionCode:
    description: 疾病/問題代碼
    fhirMapping: Condition.code.coding.code
    cardinality: 0..1
  conditionText:
    description: 疾病/問題名稱
    fhirMapping: Condition.code.text
    cardinality: 0..1
  patientId:
    description: 病人
    fhirMapping: Condition.subject.reference
    cardinality: 0..1
    reference: patient
  encounterId:
    description: 就醫紀錄
    fhirMapping: Condition.encounter.reference
    cardinality: 0..1
    reference: encounter
  onsetDate:
    description: 發病時間
    fhirMapping: Condition.onsetDateTime
    cardinality: 0..1
  abatementDate:
    description: 緩解/解決時間
    fhirMapping: Condition.abatementDateTime
    cardinality: 0..1
  recordedDate:
    description: 記錄日期
    fhirMapping: Condition.recordedDate
    cardinality: 0..1
  recorderId:
    description: 記錄者
    fhirMapping: Condition.recorder.reference
    cardinality: 0..1
    reference:
      - patient
      - practitioner
      - practitionerrole
      - relatedperson
  recorderType:
    description: 紀錄者資源類型，用於在共用 ID 時判斷 Condition.recorder.reference 應指向哪種資源。
    cardinality: 0..1
  note:
    description: 備註
    fhirMapping: Condition.note.text
    cardinality: 0..1
